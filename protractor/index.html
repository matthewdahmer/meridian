<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Constraint Pitch Sensitivity</title>
  <link rel="stylesheet" href="vendor/bootstrap.min.css" />
  <style>
    html, body { height: 100%; margin: 0; }
    body { display: flex; flex-direction: row; background: #f3f4f6; font-family: Arial, sans-serif; }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px; min-width: 260px; background: #1e2937;
      display: flex; flex-direction: column; height: 100vh;
      position: sticky; top: 0; overflow-y: auto;
    }
    #sidebar .brand {
      color: #f9fafb; font-size: .9rem; font-weight: 600;
      padding: .75rem 1rem; border-bottom: 1px solid #374151;
    }
    #sidebar .section-label {
      color: #6b7280; font-size: .68rem; text-transform: uppercase;
      letter-spacing: .08em; padding: .6rem 1rem .2rem;
    }
    #sidebar nav a {
      display: block; color: #9ca3af; font-size: .82rem;
      padding: .35rem 1rem; border-left: 3px solid transparent;
      text-decoration: none;
    }
    #sidebar nav a:hover { color: #f3f4f6; background: #273345; }
    #sidebar nav a.active { color: #60a5fa; background: #1e3a56; border-left-color: #3b82f6; }
    #sidebar nav .sub-nav-link {
      padding-left: 1.75rem;
      font-size: .78rem;
    }

    /* ── Main ── */
    #main { flex: 1; padding: 1.25rem; min-width: 0; overflow-y: auto; }

    .card {
      background: #fff; border-radius: .375rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: .75rem;
    }

    /* ── Loading / Error ── */
    .loading-state {
      display: flex; align-items: center; justify-content: center;
      min-height: 200px; color: #6b7280; gap: .5rem;
    }
    #error-panel { display: none; }

    /* ── Condition bar ── */
    #condition-bar { font-size: 0.8em; font-weight: bold}
    #condition-bar select { font-size: 0.8em; }

    /* ── Chart ── */
    #chart-container { width: 100%; }
    #chart-container svg { display: block; width: 100%; height: auto; }

    /* Mobile offcanvas trigger */
    #mobile-nav-btn { display: none; }
    @media (max-width: 767px) {
      #sidebar { display: none; }
      #mobile-nav-btn { display: block; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="brand">Meridian</div>
  <div class="section-label">Views</div>
  <nav>
    <a href="#" class="active" id="nav-protractor">Pitch Sensitivity</a>

    <a href="#ss-collapse" data-bs-toggle="collapse"
       class="d-flex justify-content-between align-items-center" id="nav-ss-toggle">
      Steady States <span>&#9660;</span>
    </a>
    <div class="collapse" id="ss-collapse">
      <ul id="ss-model-nav" style="list-style:none;padding:0;margin:0"></ul>
    </div>
  </nav>
</div>

<!-- Main -->
<div id="main">
  <!-- Mobile nav -->
  <button id="mobile-nav-btn" class="btn btn-outline-secondary btn-sm mb-2"
          data-bs-toggle="offcanvas" data-bs-target="#offcanvasSidebar">&#9776; Menu</button>

  <div id="content-area" style="display:flex; gap:.75rem; align-items:stretch;">

    <!-- Left card: condition selections -->
    <div class="card" style="flex-shrink:0; width:170px;">
      <div class="card-header py-1 px-2 text-center">
        <span class="small fw-semibold">Configuration<br>Selection</span>
      </div>
      <div id="condition-bar">
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-date">Date</label>
          <select id="sel-date" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-chips">Chips</label>
          <select id="sel-chips" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-2ceahvpt_limit_s">HRC-S CEA (°C)</label>
          <select id="sel-2ceahvpt_limit_s" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-2ceahvpt_limit_i">HRC-I CEA (°C)</label>
          <select id="sel-2ceahvpt_limit_i" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-pline03t_limit">Prop. Line #3 (°F)</label>
          <select id="sel-pline03t_limit" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-pline04t_limit">Prop. Line #4 (°F)</label>
          <select id="sel-pline04t_limit" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-1dpamzt_limit">ACIS DPA (°C)</label>
          <select id="sel-1dpamzt_limit" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-1deamzt_limit">ACIS DEA (°C)</label>
          <select id="sel-1deamzt_limit" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-fptemp_11_limit">ACIS FP (°C)</label>
          <select id="sel-fptemp_11_limit" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-4rt700t_limit">OBA Fwd Bulkhead (°F)</label>
          <select id="sel-4rt700t_limit" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-aacccdpt_limit">ACA CCD (°C)</label>
          <select id="sel-aacccdpt_limit" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-pftank2t_limit">IPS Tank (°F)</label>
          <select id="sel-pftank2t_limit" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-pm2thv1t_limit">MUPS Thruster 1B (°F)</label>
          <select id="sel-pm2thv1t_limit" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-pm1thv2t_limit">MUPS Thruster 2A (°F)</label>
          <select id="sel-pm1thv2t_limit" class="form-select form-select-sm w-100"></select>
        </div>
        <div class="mb-2">
          <label class="form-label small text-muted mb-1" for="sel-1pdeaat_limit">ACIS PSMC (°C)</label>
          <select id="sel-1pdeaat_limit" class="form-select form-select-sm w-100"></select>
        </div>
        <div>
          <label class="form-label small text-muted mb-1" for="sel-tpc_fsse_limit">Fine Sun Sensor Elec. (°F)</label>
          <select id="sel-tpc_fsse_limit" class="form-select form-select-sm w-100"></select>
        </div>
      </div>
    </div>

    <!-- Right side: column of protractor + legend -->
    <div style="flex:1; min-width:0; display:flex; flex-direction:column; gap:.75rem;">

      <!-- Top: data graphic (tabbed) -->
      <div id="protractor-panel" class="card" style="flex:1; min-height:0;">
        <div id="loading-state" class="loading-state">
          <div class="spinner-border spinner-border-sm text-primary"></div>
          <span>Loading data&hellip;</span>
        </div>
        <div id="chart-tabs" style="display:none">
          <ul class="nav nav-tabs px-2 pt-2" id="chart-tab-nav" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="tab-protractor-btn"
                      data-bs-toggle="tab" data-bs-target="#tab-protractor"
                      type="button" role="tab">Protractor</button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="tab-lineplot-btn"
                      data-bs-toggle="tab" data-bs-target="#tab-lineplot"
                      type="button" role="tab">Line Plot</button>
            </li>
          </ul>
          <div class="tab-content">
            <div class="tab-pane show active" id="tab-protractor" role="tabpanel">
              <div id="chart-container"></div>
            </div>
            <div class="tab-pane" id="tab-lineplot" role="tabpanel">
              <div id="lineplot-container"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom: configuration legend -->
      <div id="legend-card" class="card" style="display:none;">
        <div class="card-header py-1 px-2">
          <span class="small fw-semibold">Configuration</span>
        </div>
        <div id="legend-content" style="padding:.5rem .75rem;"></div>
      </div>

    </div>

  </div>

  <div id="tables-area"></div>

  <div id="error-panel" class="alert alert-danger mt-3"></div>
</div>

<script src="vendor/bootstrap.bundle.min.js"></script>
<script src="vendor/d3.min.js"></script>
<script src="app.js"></script>
<script>
  App.init();

  // Populate Steady States sidebar links from steady_states manifest.
  // Fails silently if steady_states data has not been generated yet.
  fetch('../steady_states/data/manifest.json')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(manifest => {
      const ul = document.getElementById('ss-model-nav');
      manifest.forEach(entry => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = `../steady_states/?model=${entry.nav_id}`;
        a.textContent = entry.display_name;
        a.className = 'nav-link sub-nav-link';
        li.appendChild(a);
        ul.appendChild(li);
      });
    })
    .catch(() => {});
</script>
</body>
</html>
